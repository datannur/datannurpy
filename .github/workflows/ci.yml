name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: CI (audit)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-suffix: audit
      - name: Audit production dependencies
        run: >
          uv export --no-dev --no-hashes |
          uv run --with pip-audit pip-audit -r /dev/stdin
          --ignore-vuln GHSA-5239-wwwm-4pmq

  lint:
    name: CI (lint)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-suffix: lint
      - run: uv sync --frozen
      - run: make lint
      - run: make typecheck

  test:
    name: CI (${{ matrix.python-version }}, ${{ matrix.resolution }})
    # lowest rows run on x86_64: rasterio (geo extra) ships no manylinux-aarch64
    # wheel before 1.4.4 (and none ever for cp39), so the >=1.4 floor forces a
    # source build that needs system GDAL on ARM. highest resolves to a newer
    # rasterio with aarch64 wheels, so it stays on ARM.
    runs-on: ${{ matrix.resolution == 'lowest' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.14"]
        resolution: ["lowest", "highest"]
        exclude:
          # lowest on oldest, highest on newest, lowest on 3.10 (cloud/iceberg boundary)
          - python-version: "3.9"
            resolution: "highest"
          - python-version: "3.10"
            resolution: "highest"
          - python-version: "3.14"
            resolution: "lowest"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-suffix: ${{ matrix.python-version }}-${{ matrix.resolution }}
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --resolution ${{ matrix.resolution }}

      - run: make download-app
      # Coverage is enforced only on the modern interpreter — coverage.py mis-reports
      # `continue` lines as uncovered under Python <=3.9 (fixed in 3.10+). Other
      # versions just verify the suite runs (compatibility), without the coverage gate.
      - if: matrix.python-version == '3.14'
        run: make test-cov
      - if: matrix.python-version != '3.14'
        run: make test

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.14'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: core
          fail_ci_if_error: false

  # Windows OS coverage: runs the suite on windows-latest so Windows-specific
  # path/tempfile/encoding regressions surface. Interpreter is 3.13 (its native
  # geo/db wheels are guaranteed on Windows, unlike cp314). A dedicated job
  # rather than a matrix cell keeps the runs-on/coverage logic simple; the 100%
  # coverage gate stays on Linux/3.14 (Windows skips the local-Iceberg tests).
  test-windows:
    name: CI (windows, 3.13)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-suffix: 3.13-highest-windows
      - run: choco install make
      - run: uv python install 3.13
      - run: uv sync --resolution highest
      # `make test` (not test-cov): Windows skips the local-Iceberg + POSIX-only
      # tests, so the 100% coverage gate (enforced on Linux/3.14) can't be met
      # here. This job verifies the suite passes on Windows; Linux owns coverage.
      - run: make download-app
      - run: make test
