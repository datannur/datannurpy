name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: CI (audit)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Audit production dependencies
        run: >
          uv export --no-dev --no-hashes |
          uv run --with pip-audit pip-audit -r /dev/stdin
          --ignore-vuln GHSA-5239-wwwm-4pmq

  lint:
    name: CI (lint)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: make lint
      - run: make typecheck

  test:
    name: CI (${{ matrix.python-version }}, ${{ matrix.resolution }})
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.14"]
        resolution: ["lowest", "highest"]
        exclude:
          # lowest on oldest, highest on newest, lowest on 3.10 (cloud/iceberg boundary)
          - python-version: "3.9"
            resolution: "highest"
          - python-version: "3.10"
            resolution: "highest"
          - python-version: "3.14"
            resolution: "lowest"

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: ${{ matrix.python-version }}-${{ matrix.resolution }}
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --resolution ${{ matrix.resolution }}

      - run: make download-app
      - run: make test-cov

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.14'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: core
          fail_ci_if_error: false
