name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions: read-all

jobs:
  check-version:
    name: Check Version
    runs-on: ubuntu-24.04-arm
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    outputs:
      changed: ${{ steps.version_check.outputs.changed }}
      version: ${{ steps.current_version.outputs.version }}
      tag: ${{ steps.current_version.outputs.tag }}
      prerelease: ${{ steps.current_version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get current version
        id: current_version
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          # PEP 440 pre-release detection (a/b/rc/dev)
          if [[ "${VERSION}" =~ (a|b|rc|\.dev)[0-9]+$ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if version changed
        id: version_check
        run: |
          CURRENT_VERSION="${{ steps.current_version.outputs.version }}"
          LATEST_TAG=$(gh release list --limit 1 --exclude-pre-releases --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")

          if [[ -z "$LATEST_TAG" ]]; then
            echo "No previous releases found, creating first release"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [[ "$CURRENT_VERSION" != "${LATEST_TAG#v}" ]]; then
            echo "Version changed from ${LATEST_TAG#v} to ${CURRENT_VERSION}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version unchanged (${CURRENT_VERSION})"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  database-tests:
    name: Database Tests
    needs: [check-version]
    if: needs.check-version.outputs.changed == 'true'
    uses: ./.github/workflows/test-databases.yml

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [check-version, database-tests]
    if: needs.check-version.outputs.changed == 'true'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - run: uv python install 3.14
      - run: uv sync --frozen

      - name: Download app
        run: make download-app

      - name: Build package
        run: uv build

      - name: Generate CycloneDX SBOM
        run: |
          mkdir -p sbom
          SBOM_FILE="sbom/datannurpy-${{ needs.check-version.outputs.version }}-sbom.cyclonedx.json"
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin v1.42.3
          syft scan dir:. -o cyclonedx-json="${SBOM_FILE}"

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          awk "/^## ${VERSION} / { found=1; next } /^## / && found { exit } found { print }" CHANGELOG.md > /tmp/changelog_section.md
          if [ -s /tmp/changelog_section.md ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0

      - name: Create GitHub release
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          PRERELEASE_FLAG=""
          if [[ "${{ needs.check-version.outputs.prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          if [[ "${{ steps.changelog.outputs.found }}" == "true" ]]; then
            gh release create "${TAG}" ${PRERELEASE_FLAG} --title "datannurpy ${TAG}" --notes-file /tmp/changelog_section.md dist/* sbom/*
          else
            gh release create "${TAG}" ${PRERELEASE_FLAG} --title "datannurpy ${TAG}" --generate-notes dist/* sbom/*
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
