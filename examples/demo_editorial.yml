# Hybrid demo: scan the local data/ folder and merge it with the editorial
# metadata shipped with the datannur front app (rich descriptions, tags,
# Organizations, concepts, etc.), plus a small local overlay.
#
# Prerequisite: run `make download-app` first — it fetches the front repo and
# preserves its db-source/ and pdf/ demo assets into examples/datannur_app/
# (this folder is gitignored to keep a single source of truth in the front repo).
app_path: ./output_editorial
refresh: true
update_app: true
open_browser: true

metadata_path:
  - ./datannur_app/db-source
  - ./datannur_app_overlay

copy_assets:
  - from: ./datannur_app/db-source/md
    to: data/db-source/md
  - from: ./datannur_app/db-source/dataset
    to: data/db-source/dataset
  - from: ./datannur_app/pdf
    to: data/pdf

post_export:
  - generate_openapi
  - export_dcat
  - export_iso
  - export_stac

add:
  - folder: ./datannur_app/db-source/dataset
    create_folders: false
    on_unmatched: error

  - folder: ../data

  - database: sqlite:///../data/company.db

  - database: sqlite:///../data/photovoltaik.gpkg
    metadata:
      id: photovoltaik
      name: Grandes installations photovoltaïques
      description: >
        Installations photovoltaïques de haute altitude en Suisse.
        Source: Office fédéral de l'énergie (OFEN) - opendata.swiss
